y.current>=3&&p(!0)},children:["The Game v",la]})]})]})}const aN=`# How to Play

The Game is **cooperative** — everyone wins together or loses together. There are no
opponents at the table, only the deck. Your table's job is to empty as much of the deck
onto four shared piles as you can.

## The goal

Play all **98 number cards** (2 through 99) onto the four piles. Empty the whole deck and
you achieve a **Victory**. Come close and you've still done well — the end screen celebrates
how few cards you had left.

## The four piles

There are four piles in the middle of the table:

- **Two ascending piles** that start at **1** and must go **up** (each card played must be
  higher than the card currently on top).
- **Two descending piles** that start at **100** and must go **down** (each card must be
  lower than the top card).

On your turn you add cards from your hand to any of the four piles, following those
directions.

## The backwards trick (±10)

There is one way to go *against* a pile's direction: you may play a card that is **exactly
10 away** in the wrong direction.

- On an **ascending** pile you may play a card **10 lower** than the top (for example, play
  **56** on top of **66**).
- On a **descending** pile you may play a card **10 higher** than the top (for example, play
  **74** on top of **64**).

This "trick" is the heart of the game — it lets the table claw a pile back to a friendlier
number. Saving a card that sets up a ±10 trick for a teammate is often the smartest play.

## Your turn

On your turn you **must play at least two cards** (while the draw pile still has cards). You
may always play **more** than two if you can and want to — the more you clear, the better.

When you're done, you **draw back up** to a full hand and play passes to the next person.

Once the **draw pile is empty**, the minimum drops to **one card per turn** — keep going as
long as anyone can legally play.

## Winning and losing

- **You win** when every card has been played.
- **You lose** the moment the player whose turn it is **cannot play their minimum** — there
  is simply no legal move left.

At the end, the table's result is shown as:

- **Victory** (gold) — 0 cards left. A perfect clear.
- **Excellent** (green) — 1 to 9 cards left. A strong game.
- **Failure** (red) — 10 or more cards left. Regroup and try again.

## Talking to your team

You may **encourage and warn** each other, but you may **not** say a specific card number.
Instead of "I have 68," say things like *"don't touch the second down pile"* or *"leave that
one to me — I can bring it back."* The in-game chat only offers phrases that follow this
rule, so you can't slip up. (Your computer teammates talk this way too — and, to keep things
interesting, a bot will occasionally decide it knows better and override a request.)

## The expert variant

Feeling confident? Turn on **Expert** in the lobby to raise the minimum to **three** cards
per turn while the draw pile lasts, and optionally deal one fewer card to each player.
`,lN=`# User Manual

Welcome! This guide covers everything the app can do. For the rules of the game itself, see
the **Rules** tab.

## Starting a game

From the home screen you can:

- **Play locally** — set up a table on this one device. Add up to five seats; each can be a
  **human** (you pass the device around) or a **computer** player.
- **Play online** — create a room, share the link, and everyone plays together on their own
  device in near real time.

### Setting up the table (local)

In the lobby you can add seats with **+ Human** or **+ Bot**, rename anyone, and remove
seats. For each computer player you choose a difficulty:

- **Easy** — plays simply and safely.
- **Standard** — looks a move ahead and finds trick combinations.
- **Hard** — plans further and hoards useful ±10 pairs for the endgame.

You can also pick the **card theme** (see below), the **Expert** variant, and each seat's
**card back**. Then press **Deal & Play**.

### Who goes first

After the deal, every seat shows a fuzzy opening-strength rating — **Strong**, **Fair** or
**Weak** — never an actual card number. The strongest hand is recommended to start; the
table (or the online host) confirms who begins.

## Playing a turn

1. **Tap one of your cards.** The piles it can legally go on light up. A **gold shimmer**
   means that pile would use the ±10 backwards trick.
2. **Tap a glowing pile** to play the card there.
3. Repeat until you've met the minimum (shown on the **End turn** button), then some more if
   you can.
4. **Undo** takes back cards you've played this turn (before you end it).
5. **End turn** commits your plays, draws you back up to a full hand, and passes play on.

## Playing online

- **Create a room** to get a 5-letter code and a share link. Send the link to friends.
- **Join** by opening a shared link, or by entering the code. Pick your name and card back
  first, then join.
- The **host** adds computer players, sets the theme and Expert variant, and starts the game.
- Everyone sees each card land as it's played. Your own hand is face-up; everyone else's is
  face-down with a card count.
- If your connection drops, just **reopen the link** — your seat and the full game come back.

## Talking to your team (§4.4)

Open the phrase bar during a game to send a legal table-talk phrase — an encouragement or a
warning like *"Nothing for the ascenders"* or *"Don't touch ↓ Down 2."* You can never reveal
a specific number; the phrase menu only offers safe options. Everything said appears in the
**activity log**.

## The activity log

Tap **📜 Log** during a game to slide open a turn-by-turn history: every card played (tricks
flagged) and every phrase said, grouped by turn — so you can always see exactly what the
computer players did and "said." Each player's strip also shows their most recent action.

## Card themes

The card faces come in selectable **theme sets**:

- **Animals** — ten animal groups, one per decade (dogs, sloths, sea turtles, ladybugs,
  jellyfish, alligators, owls, monkeys, marine fish, capybaras).
- **Food** — ten dishes (pancakes, popcorn, sushi, ramen, burrito, gumbo, butter chicken,
  New York pizza, soft serve, steak).

The host picks one set for the whole table; you can set your personal default in **Settings**.

## Settings

Open **⚙ Settings** from the home screen to choose:

- **Theme** — Light or Dark.
- **Card theme** — your default illustration set (Animals or Food).
- **Reduce motion** — calms the shimmer, confetti and card animations (also honours your
  device's reduced-motion setting).
- **Default card back** — your preferred back, previewed in a grid.

## History & trends

Every finished game is recorded on your device. Open **📊 History & Trends** to see your
results over time, your best games, and how your average result is trending. Nothing is
uploaded — the history lives only in this browser.

## Tips

- The ±10 trick is your best friend — plan around it. A card that's exactly 10 from a pile
  top can rescue that pile.
- Try not to "jump" a pile by a large amount unless you have to. Small steps keep options
  open for your teammates.
- When the draw pile runs out the minimum drops to one — squeeze out every last legal play.
